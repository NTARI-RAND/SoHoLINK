{{define "content"}}
<div class="container">
  <div class="login-wrap">
    <div class="card">
      <div class="login-head">
        <div class="page-header-label">Access</div>
        <h2>Sign in</h2>
      </div>
      <form method="POST" action="/login">
        <div class="form-group">
          <label>Role</label>
          <div class="role-group">
            <input class="role-input" type="radio" name="role" id="role-provider" value="provider" checked>
            <label class="role-label" for="role-provider">Provider</label>
            <input class="role-input" type="radio" name="role" id="role-consumer" value="consumer">
            <label class="role-label" for="role-consumer">Consumer</label>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email"
                 autocomplete="email" required placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">
          Sign in &rarr;
        </button>
      </form>
    </div>
  </div>
</div>
{{end}}
{{template "layout" .}}
