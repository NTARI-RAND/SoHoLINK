name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Least-privilege token: this workflow only checks out and builds/tests.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: soholink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          # Read the Go version from go.mod so the workflow tracks the
          # project's source-of-truth. Avoids the setup-go cache-key
          # collision that fires when go-version drifts below what
          # go.mod requires (Go auto-downloads the newer toolchain at
          # build time; cache restoration then collides on toolchain
          # files already present on disk).
          go-version-file: go.mod

      - name: Verify build
        env:
          ALLOWLIST_PUBLIC_KEY: ${{ secrets.ALLOWLIST_PUBLIC_KEY }}
        run: |
          go build -ldflags "-X github.com/NetworkTheoryAppliedResearchInstitute/soholink/internal/agent.AllowlistPublicKey=$ALLOWLIST_PUBLIC_KEY" ./cmd/agent/...
          go build ./...

      - name: Run unit tests (no DB required)
        run: go test -v ./internal/portal/ ./internal/agent/ ./internal/network/

      - name: Run integration tests (DB required)
        env:
          TEST_DATABASE_URL: postgres://postgres:changeme@localhost:5432/soholink_test?sslmode=disable
        run: go test -v -tags integration -count=1 -p 1 ./...
