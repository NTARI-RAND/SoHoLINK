name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Verify build
        run: go build ./...

      - name: Run unit tests (no DB required)
        run: go test -v ./internal/portal/ ./internal/agent/ ./internal/network/

      - name: Run integration tests (DB required)
        env:
          DATABASE_URL: postgres://postgres:changeme@localhost:5432/postgres?sslmode=disable
        run: go test -v -tags integration -count=1 ./...
