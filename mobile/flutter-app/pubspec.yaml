name: soholink_node
description: SoHoLINK Node Dashboard – monitor and manage your federated edge node.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & storage
  http: ^1.2.0
  shared_preferences: ^2.2.2       # non-sensitive prefs (base URL)
  flutter_secure_storage: ^9.0.0   # encrypted keychain / EncryptedSharedPrefs for token

  # Cryptography — Ed25519 signing for owner keypair auth (Option C)
  cryptography: ^2.7.0

  # Real-time transport
  web_socket_channel: ^2.4.0  # WebSocket client for /ws/nodes task dispatch

  # Firebase — FCM background wakeup for Android
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0  # foreground notification display

  # Device info — TV detection + MobileNodeInfo population
  battery_plus: ^6.0.0
  device_info_plus: ^10.0.0
  package_info_plus: ^8.0.0

  # UI helpers
  intl: ^0.19.0
  fl_chart: ^0.68.0        # sparkline / bar charts on Revenue page
  google_fonts: ^6.2.1     # Rajdhani for headers, Inter for body

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
