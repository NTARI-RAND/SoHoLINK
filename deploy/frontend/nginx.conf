# Frontend edge for the SoHoLINK public site.
#
# Serves the static landing page and reverse-proxies the application routes to
# the backend containers over the compose network. This is the "front" that
# connects to the "back": nothing here holds state; it routes.
#
# NOTE (2026-07-13): the running backend images predate the merged onboarding
# server and /v0 wire. Once the backend is redeployed from main, the /enroll,
# /apply, /verify, /conformance, /dashboard, and /api routes below resolve to
# the operator console; until then they reach the portal but its older routes
# answer. The static landing page and the /app/ connectivity path work today.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static marketing landing page + brand assets (logo SVGs).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend: the SoHoLINK portal (operator console, onboarding, dashboard).
    # `portal` resolves on the compose network; this is the front->back link.
    location = /app  { return 302 /app/; }
    location /app/ {
        proxy_pass         http://portal:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Operator-onboarding + app routes served by the portal backend.
    location ~ ^/(enroll|apply|verify|conformance|dashboard|api|disputes)(/|$) {
        proxy_pass         http://portal:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
