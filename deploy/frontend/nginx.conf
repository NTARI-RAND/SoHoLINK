# Frontend edge for the SoHoLINK public site.
#
# Serves the marketing landing page at the site root and passes EVERYTHING ELSE
# through to the portal backend, so the operator console, login/register,
# onboarding, dashboard, downloads, and static assets all keep working at their
# existing paths while `/` becomes the landing page.
#
# The homepage is the ONLY path served locally (plus the two brand SVGs). This
# is deliberate: an exact-match `location = /` cannot accidentally shadow a
# portal route, and the catch-all proxy means new portal routes need no change
# here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Marketing landing page — exact root only.
    location = / {
        try_files /index.html =404;
    }

    # Brand assets served statically (the landing page's favicon + lockup).
    location = /soholink-mark.svg        { }
    location = /soholink-logo-lockup.svg { }

    # Everything else is the portal backend: /login, /register, /enroll,
    # /dashboard, /download, /privacy, /static/*, /api/*, /nodes/*, etc.
    location / {
        proxy_pass         http://portal:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
