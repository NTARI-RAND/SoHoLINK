agent {
    data_dir           = "/opt/spire/data/agent"
    log_level          = "INFO"
    server_address     = "spire-server"
    server_port        = 8081
    socket_path        = "/run/spire/sockets/agent.sock"
    trust_domain       = "soholink.org"
    insecure_bootstrap = true
}

plugins {
    # Durable cert-based attestation (TODO 36): stable, cert-fingerprint-derived
    # SPIFFE ID, no consumable join token. Survives SVID expiry + restart.
    NodeAttestor "x509pop" {
        plugin_data {
            certificate_path = "/etc/spire/agent.crt"
            private_key_path  = "/etc/spire/agent.key"
        }
    }

    WorkloadAttestor "unix" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            directory = "/opt/spire/data/agent"
        }
    }
}
