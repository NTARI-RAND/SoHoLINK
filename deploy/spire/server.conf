server {
    bind_address = "0.0.0.0"
    bind_port    = "8081"
    socket_path  = "/run/spire-server/private/api.sock"
    trust_domain = "soholink.org"
    data_dir     = "/opt/spire/data/server"
    log_level    = "INFO"
    ca_ttl       = "720h"

    ca_subject {
        country      = ["US"]
        organization = ["NTARI"]
        common_name  = "SoHoLINK CA"
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type     = "sqlite3"
            connection_string = "/opt/spire/data/server/datastore.sqlite3"
        }
    }

    # Durable cert-based node attestation (TODO 36). The agent's SPIFFE ID is
    # derived from its leaf-cert fingerprint and is STABLE across restarts, so
    # there is no one-time token to exhaust (the join_token failure mode where
    # an SVID expiry + restart crash-loops on "token already used"). join_token
    # kept for transition/fallback; the agent now uses x509pop.
    NodeAttestor "x509pop" {
        plugin_data {
            ca_bundle_path = "/etc/spire/x509pop-ca.crt"
        }
    }
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/opt/spire/data/server/keys.json"
        }
    }
}
