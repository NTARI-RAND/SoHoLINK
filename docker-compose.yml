services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - "postgres"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=test ! -f /wal-archive/%f && cp %p /wal-archive/%f"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - "D:/SoHoLINK-backups/wal:/wal-archive"
    ports:
      - "127.0.0.1:5432:5432"

  pg-backup:
    build:
      context: ./deploy/pg-backup
    restart: unless-stopped
    env_file: .env
    environment:
      PGHOST: postgres
      PGUSER: postgres
      PGDATABASE: postgres
      BACKUP_INTERVAL_SECONDS: "86400"
      RETENTION_DAYS: "90"
    volumes:
      - "D:/SoHoLINK-backups:/backups"
    depends_on:
      postgres:
        condition: service_started

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    restart: unless-stopped
    command: ["-config", "/etc/spire/server.conf"]
    volumes:
      - ./deploy/spire/server.conf:/etc/spire/server.conf:ro
      - spire_data:/opt/spire/data/server
      - spire_socket:/run/spire-server/private
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck",
             "-socketPath", "/run/spire-server/private/api.sock"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.9.6
    restart: unless-stopped
    pid: "host"
    command:
      - "-config"
      - "/etc/spire/agent.conf"
      - "-joinToken"
      - "${SPIRE_AGENT_JOIN_TOKEN}"
    volumes:
      - ./deploy/spire/agent.conf:/etc/spire/agent.conf:ro
      - spire_agent_socket:/run/spire/sockets
      - spire_agent_data:/opt/spire/data/agent
    depends_on:
      spire-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck",
             "-socketPath", "/run/spire/sockets/agent.sock"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    restart: unless-stopped
    env_file: .env
    environment:
      ORCHESTRATOR_INTERNAL_URL: "http://orchestrator:8083"
    expose:
      - "8080"
    volumes:
      - spire_socket:/run/spire-server/private:ro
    depends_on:
      postgres:
        condition: service_started
      spire-server:
        condition: service_healthy
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    restart: unless-stopped
    env_file: .env
    environment:
      INTERNAL_ADDR: ":8083"
    expose:
      - "8082"
    volumes:
      - spire_agent_socket:/run/spire/sockets:ro
      - spire_socket:/run/spire-server/private:ro
      - ./deploy/allowlist:/etc/soholink:ro
    depends_on:
      postgres:
        condition: service_started
      spire-agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --no-check-certificate https://localhost:8082/health > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      portal:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run bb7b7f0d-0d50-4d58-858b-abc52f1d7cd4
    volumes:
      # Host path to the cloudflared credential dir. Set CLOUDFLARED_DIR in
      # .env per host; defaults to a repo-relative dir. Never hardcode an
      # operator's home path here — this file is public (audit finding M5).
      - ${CLOUDFLARED_DIR:-./deploy/cloudflared}:/etc/cloudflared
    depends_on:
      - nginx

volumes:
  postgres_data:
  spire_data:
  spire_socket:
  spire_agent_socket:
  spire_agent_data:
