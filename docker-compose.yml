services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      portal:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run bb7b7f0d-0d50-4d58-858b-abc52f1d7cd4
    volumes:
      - C:/Users/Jodson Graves/.cloudflared:/etc/cloudflared
    depends_on:
      - nginx

volumes:
  postgres_data:
