services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.9.6
    restart: unless-stopped
    command: ["-config", "/etc/spire/server.conf"]
    volumes:
      - ./deploy/spire/server.conf:/etc/spire/server.conf:ro
      - spire_data:/opt/spire/data/server
      - spire_socket:/run/spire-server/private
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck",
             "-socketPath", "/run/spire-server/private/api.sock"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  portal:
    build:
      context: .
      dockerfile: Dockerfile.portal
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    volumes:
      - spire_socket:/run/spire-server/private:ro
    depends_on:
      postgres:
        condition: service_started
      spire-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      portal:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run bb7b7f0d-0d50-4d58-858b-abc52f1d7cd4
    volumes:
      - C:/Users/Jodson Graves/.cloudflared:/etc/cloudflared
    depends_on:
      - nginx

volumes:
  postgres_data:
  spire_data:
  spire_socket:
